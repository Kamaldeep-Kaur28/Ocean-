<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Explorer | Beautiful Ocean</title>
    <!-- Clean, modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            /* Beautiful Light Blue Ocean Scenery Background */
            background-color: #add8e6; 
            background-image: url('https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-attachment: fixed;
        }

        /* Glassmorphism Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            color: #fdfdfd;
            line-height: 1.6;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
        }

        .cta-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #005bb5;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            background: #ffffff;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <!-- Central UI Card -->
    <div class="glass-card">
        <h1>Aqua Explorer</h1>
        <p>Welcome to the serene beauty of the deep blue. Interact with our smart AI assistant to discover amazing facts and secrets of marine life.</p>
        <div class="cta-btn">Click the Chat Icon 🌊</div>
    </div>

    <!-- 🔥 WATSON CHATBOT SCRIPT 🔥 -->
    <script>
      window.watsonAssistantChatOptions = {
        integrationID: "d1494679-4cd3-4ea0-bb19-01059fcbebd5", // The ID of this integration.
        region: "https://integrations.eu-de.assistant.watson.appdomain.cloud", // The region your integration is hosted in.
        serviceInstanceID: "07759be1-4cde-4477-8582-0f1ddeaba834", // The ID of your service instance.
        onLoad: async (instance) => { await instance.render(); }
      };
      setTimeout(function(){
        const t=document.createElement('script');
        t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
        document.head.appendChild(t);
      });
    </script>

</body>
</html>
